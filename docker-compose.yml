version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skychat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skychat_password}
      POSTGRES_DB: ${POSTGRES_DB:-skychat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skychat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [skychat]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [skychat]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Overrides whatever DATABASE_URL/REDIS_URL are in backend/.env so the
      # backend always talks to the service names on the Docker network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-skychat}:${POSTGRES_PASSWORD:-skychat_password}@postgres:5432/${POSTGRES_DB:-skychat}
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks: [skychat]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks: [skychat]

networks:
  skychat:

volumes:
  postgres_data:
  redis_data:
  uploads_data:
